apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    control-plane: controller-manager
  name: amq-broker-controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      control-plane: controller-manager
      name: amq-broker-operator
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        com.company: Red_Hat
        control-plane: controller-manager
        name: amq-broker-operator
        rht.comp: Broker_AMQ
        rht.comp_ver: 8.0.0
        rht.prod_name: Red_Hat_Integration
        rht.prod_ver: 2026.Q3
        rht.subcomp: broker-amq-operator
        rht.subcomp_t: application
    spec:
      containers:
      - args:
        - --zap-log-level=info
        - --zap-encoder=console
        - --zap-time-encoding=iso8601
        - --leader-elect
        command:
        - /home/amq-broker-operator/bin/entrypoint
        env:
        - name: RELATED_IMAGE_BROKER_INIT_800
          value: registry.redhat.io/amq8/amq-broker-init-rhel9@sha256:6629942d96e807b20604acfa4c6af7e4ad926335876011035514525cae99174c
        - name: RELATED_IMAGE_BROKER_KUBERNETES_800
          value: registry.redhat.io/amq8/amq-broker-rhel9@sha256:728f8b2ca04c0476c12dcb48ad11902851a1f09c5be9d18b57b5ebf281b7c7a3
        - name: RELATED_IMAGE_BROKER_INIT_800_ppc64le
          value: registry.redhat.io/amq8/amq-broker-init-rhel9@sha256:6629942d96e807b20604acfa4c6af7e4ad926335876011035514525cae99174c
        - name: RELATED_IMAGE_BROKER_KUBERNETES_800_ppc64le
          value: registry.redhat.io/amq8/amq-broker-rhel9@sha256:728f8b2ca04c0476c12dcb48ad11902851a1f09c5be9d18b57b5ebf281b7c7a3
        - name: RELATED_IMAGE_BROKER_INIT_800_s390x
          value: registry.redhat.io/amq8/amq-broker-init-rhel9@sha256:6629942d96e807b20604acfa4c6af7e4ad926335876011035514525cae99174c
        - name: RELATED_IMAGE_BROKER_KUBERNETES_800_s390x
          value: registry.redhat.io/amq8/amq-broker-rhel9@sha256:728f8b2ca04c0476c12dcb48ad11902851a1f09c5be9d18b57b5ebf281b7c7a3
        - name: OPERATOR_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['name']
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: WATCH_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ENABLE_WEBHOOKS
          value: "false"
        image: registry.redhat.io/amq8/amq-broker-rhel9-operator@sha256:3eaf1917704a5a4d00ded0b472f587836a3aaf90443713e05d58074ab5445b2f
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 8383
          name: http-metrics
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 1000m
            memory: 384Mi
          requests:
            cpu: 200m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePolicy: FallbackToLogsOnError
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: amq-broker-controller-manager
      terminationGracePeriodSeconds: 10
