apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: arkmq-org-broker-controller-manager-netpol
  labels:
    control-plane: controller-manager
  {{- include "arkmq-org-broker-operator.labels" . | nindent 4 }}
spec:
  ingress:
  - ports:
    - port: 8081
      protocol: TCP
  - ports:
    - port: 8383
      protocol: TCP
  podSelector:
    matchLabels:
      control-plane: controller-manager
      name: arkmq-org-broker-operator
  policyTypes:
  - Ingress
