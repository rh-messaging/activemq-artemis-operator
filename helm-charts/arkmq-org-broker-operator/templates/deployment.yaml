apiVersion: apps/v1
kind: Deployment
metadata:
  name: activemq-artemis-controller-manager
  labels:
    control-plane: controller-manager
  {{- include "arkmq-org-broker-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.controllerManager.replicas }}
  strategy:
    rollingUpdate:
      maxSurge: {{ .Values.controllerManager.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.controllerManager.strategy.rollingUpdate.maxUnavailable
        }}
    type: {{ .Values.controllerManager.strategy.type | quote }}
  selector:
    matchLabels:
      control-plane: controller-manager
      name: activemq-artemis-operator
    {{- include "arkmq-org-broker-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        control-plane: controller-manager
        name: activemq-artemis-operator
      {{- include "arkmq-org-broker-operator.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - args: {{- toYaml .Values.controllerManager.manager.args | nindent 8 }}
        command:
        - /home/activemq-artemis-operator/bin/entrypoint
        env:
        - name: RELATED_IMAGE_BROKER_INIT_2150
          value: {{ quote (printf "%s@%s" .Values.controllerManager.manager.relatedImages.brokerInitRepository .Values.controllerManager.manager.relatedImages.brokerInit2150.digest)
            }}
        - name: RELATED_IMAGE_BROKER_KUBERNETES_2150
          value: {{ quote (printf "%s@%s" .Values.controllerManager.manager.relatedImages.brokerKubernetesRepository .Values.controllerManager.manager.relatedImages.brokerKubernetes2150.digest)
            }}
        - name: RELATED_IMAGE_BROKER_INIT_2160
