        - name: OPERATOR_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['name']
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: WATCH_NAMESPACE
          value: {{ if .Values.clusterScoped }}{{ join "," .Values.watchNamespaces | quote }}{{ else }}{{ .Release.Namespace | quote }}{{ end }}
        - name: ENABLE_WEBHOOKS
          value: {{ quote false }}
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.controllerManager.manager.image.repository }}:{{ .Values.controllerManager.manager.image.tag
          | default .Chart.AppVersion }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        {{- with .Values.controllerManager.manager.image.pullPolicy }}
        imagePullPolicy: {{ . }}
        {{- end }}
        ports:
        - containerPort: 8383
          name: http-metrics
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources: {{- toYaml .Values.controllerManager.manager.resources | nindent 10
          }}
        securityContext: {{- toYaml .Values.controllerManager.manager.containerSecurityContext
          | nindent 10 }}
        terminationMessagePolicy: FallbackToLogsOnError
      imagePullSecrets: {{ .Values.imagePullSecrets | default list | toJson }}
      securityContext: {{- toYaml .Values.controllerManager.podSecurityContext | nindent
        8 }}
      serviceAccountName: activemq-artemis-controller-manager
      terminationGracePeriodSeconds: 10
      nodeSelector: {{- toYaml .Values.controllerManager.nodeSelector | nindent 8 }}
      tolerations: {{ .Values.controllerManager.tolerations | default list | toJson }}
      topologySpreadConstraints: {{ .Values.controllerManager.topologySpreadConstraints | default list | toJson }}
