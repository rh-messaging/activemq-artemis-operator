apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: controller-manager-netpol
  labels:
    control-plane: controller-manager
spec:
  podSelector:
    matchLabels:
      control-plane: controller-manager
      name: arkmq-org-broker-operator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Kubelet health and readiness probes
    - ports:
        - port: 8081
          protocol: TCP
    # Metrics endpoint
    - ports:
        - port: 8383
          protocol: TCP
  egress:
    # Cluster DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Kubernetes API server
    - ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
    # Broker Jolokia via console (non-restricted mode)
    - ports:
        - port: 8161
          protocol: TCP
    # Broker Jolokia via JVM agent (restricted mode)
    - ports:
        - port: 8778
          protocol: TCP
