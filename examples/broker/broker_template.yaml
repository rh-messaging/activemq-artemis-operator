apiVersion: broker.arkmq.org/v1beta2
kind: Broker
metadata:
  name: my-broker-template
spec:
  resourceTemplates:
  - selector:
     kind: "StatefulSet"
    annotations:
     someKey: "someValue"
    patch:
     kind: "StatefulSet"
     spec:
      template:
       spec:
        containers:
        - name: "my-broker-template-container"
          securityContext:
           runAsNonRoot: true